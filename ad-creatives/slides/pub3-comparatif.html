<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .container { width: 1080px; height: 1080px; display: flex; flex-direction: column; background: #000; }

  /* Photo sections */
  .photo-section { position: relative; width: 1080px; height: 480px; overflow: hidden; }
  .photo-section img { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; }

  /* Color overlays */
  .overlay-danger { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(139,0,0,0.3); z-index: 1; }
  .overlay-success { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,100,0,0.15); z-index: 1; }

  /* Badges */
  .badge { position: absolute; top: 20px; left: 20px; padding: 10px 22px; border-radius: 6px; font-size: 22px; font-weight: 800; color: white; letter-spacing: 1.5px; text-transform: uppercase; z-index: 3; display: flex; align-items: center; gap: 10px; }
  .badge-danger { background: #DC2626; }
  .badge-success { background: #16A34A; }

  /* Centered text on photos */
  .photo-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3; color: white; font-size: 48px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 4px 20px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5); text-align: center; }

  /* Bottom bar */
  .bottom-bar { width: 1080px; height: 120px; background: rgba(10, 10, 10, 0.95); display: flex; align-items: center; justify-content: center; padding: 0 48px; gap: 32px; }
  .price-badge { display: flex; align-items: center; gap: 12px; }
  .price-pill { background: #F97316; color: white; font-size: 28px; font-weight: 900; padding: 10px 22px; border-radius: 50px; }
  .price-text { color: white; font-size: 26px; font-weight: 600; }
  .separator-dot { color: rgba(255,255,255,0.3); font-size: 24px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-square { width: 34px; height: 34px; background: #B8CC30; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 900; color: #0F172A; border-radius: 4px; }
  .logo-text { color: white; font-size: 16px; font-weight: 700; letter-spacing: 2px; }
  .location { color: rgba(255,255,255,0.7); font-size: 20px; font-weight: 500; }
</style>
</head>
<body>
  <div class="container">
    <!-- AVANT - Si vous attendez -->
    <div class="photo-section">
      <div class="overlay-danger"></div>
      <div class="badge badge-danger">❌ Si vous attendez</div>
      <div class="photo-text">Rénovation complète</div>
      <img src="../pub3-comparatif-avant.jpg" alt="Avant">
    </div>

    <!-- APRÈS - Si vous agissez -->
    <div class="photo-section">
      <div class="overlay-success"></div>
      <div class="badge badge-success">✅ Si vous agissez</div>
      <div class="photo-text">Nettoyage préventif</div>
      <img src="../pub3-comparatif-apres.jpg" alt="Après">
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <div class="price-badge">
        <span class="price-pill">10-20x</span>
        <span class="price-text">moins cher</span>
      </div>
      <span class="separator-dot">·</span>
      <div class="logo">
        <div class="logo-square">AM</div>
        <span class="logo-text">COUVERTURE</span>
      </div>
      <span class="separator-dot">·</span>
      <span class="location">Loiret (45)</span>
    </div>
  </div>
</body>
</html>
