<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .container { width: 1080px; height: 1080px; display: flex; flex-direction: column; background: #0A0A0A; }

  /* Photo section */
  .photo-section { position: relative; width: 1080px; height: 920px; overflow: hidden; }
  .photo-section img { width: 100%; height: 100%; object-fit: cover; }

  /* Badge */
  .badge { position: absolute; top: 24px; left: 24px; z-index: 2; background: rgba(220,38,38,0.85); color: white; font-size: 16px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
  .badge-dot { width: 10px; height: 10px; background: #EF4444; border-radius: 50%; box-shadow: 0 0 8px #EF4444; }

  /* Bottom bar */
  .bottom-bar { width: 1080px; height: 160px; background: #0A0A0A; display: flex; flex-direction: column; justify-content: center; padding: 0 48px; gap: 10px; }
  .text-main { color: white; font-size: 22px; font-weight: 600; }
  .text-sub { color: #9CA3AF; font-size: 16px; font-weight: 400; }
  .separator { width: 100%; height: 1px; background: rgba(255,255,255,0.1); }
  .footer-line { color: rgba(255,255,255,0.45); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
  <div class="container">
    <div class="photo-section">
      <img src="../vague-2/comparatif-avant.jpg" alt="Mousse sur toiture">
      <div class="badge">
        <span class="badge-dot"></span>
        Danger invisible
      </div>
    </div>

    <div class="bottom-bar">
      <span class="text-main">Depuis le sol, votre toit a l'air normal.</span>
      <span class="text-sub">On vérifie pour vous. Gratuitement.</span>
      <div class="separator"></div>
      <span class="footer-line">🛡️ Inspection GRATUITE · AM COUVERTURE · Loiret (45)</span>
    </div>
  </div>
</body>
</html>
