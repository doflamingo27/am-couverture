<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .container { width: 1080px; height: 1080px; display: flex; flex-direction: column; background: #000; }

  /* Top split section */
  .split-row { display: flex; width: 1080px; height: 960px; }
  .column { width: 540px; display: flex; flex-direction: column; }

  /* Photo areas */
  .photo-area { position: relative; width: 540px; height: 580px; overflow: hidden; }
  .photo-area img { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; }

  /* Badges */
  .badge { position: absolute; top: 16px; left: 16px; padding: 8px 18px; border-radius: 6px; font-size: 20px; font-weight: 800; color: white; letter-spacing: 1px; text-transform: uppercase; z-index: 3; }
  .badge-danger { background: #DC2626; }
  .badge-success { background: #16A34A; }

  /* Text blocks under photos */
  .text-block { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 28px; text-align: center; gap: 8px; }
  .text-block-danger { background: #7F1D1D; }
  .text-block-success { background: #14532D; }
  .text-title { color: white; font-size: 28px; font-weight: 700; line-height: 1.2; }
  .text-subtitle { color: rgba(255,255,255,0.8); font-size: 22px; font-weight: 500; line-height: 1.3; }
  .text-highlight { color: #FCD34D; font-size: 24px; font-weight: 800; }

  /* Vertical divider */
  .column:first-child { border-right: 2px solid rgba(255,255,255,0.15); }

  /* Bottom bar */
  .bottom-bar { width: 1080px; height: 120px; background: #F97316; display: flex; align-items: center; justify-content: center; padding: 0 48px; gap: 24px; }
  .shield-text { display: flex; align-items: center; gap: 12px; }
  .shield-icon { font-size: 36px; }
  .shield-label { color: white; font-size: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
  .bottom-divider { width: 2px; height: 48px; background: rgba(255,255,255,0.4); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-square { width: 38px; height: 38px; background: #0F172A; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 900; color: #B8CC30; border-radius: 5px; }
  .logo-text { color: white; font-size: 18px; font-weight: 700; letter-spacing: 3px; }

  /* Horizontal divider between photos and text */
  .h-divider { width: 540px; height: 2px; background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
  <div class="container">
    <div class="split-row">
      <!-- Colonne gauche — Mauvais nettoyage -->
      <div class="column">
        <div class="photo-area">
          <div class="badge badge-danger">❌ Sans hydrofuge</div>
          <img src="../pub4-mousse-revenue.jpg" alt="Mousse revenue">
        </div>
        <div class="h-divider"></div>
        <div class="text-block text-block-danger">
          <span class="text-title">Simple nettoyage</span>
          <span class="text-subtitle">Mousse de retour<br>en 1-2 ans</span>
        </div>
      </div>

      <!-- Colonne droite — Traitement pro -->
      <div class="column">
        <div class="photo-area">
          <div class="badge badge-success">✅ Avec hydrofuge</div>
          <img src="../pub4-toit-hydrofuge.jpg" alt="Toit hydrofugé">
        </div>
        <div class="h-divider"></div>
        <div class="text-block text-block-success">
          <span class="text-title">Nettoyage +<br>Hydrofuge pro</span>
          <span class="text-highlight">Protection 5-10 ans</span>
        </div>
      </div>
    </div>

    <!-- Bande orange bas -->
    <div class="bottom-bar">
      <div class="shield-text">
        <span class="shield-icon">🛡️</span>
        <span class="shield-label">Protection garantie</span>
      </div>
      <div class="bottom-divider"></div>
      <div class="logo">
        <div class="logo-square">AM</div>
        <span class="logo-text">COUVERTURE</span>
      </div>
    </div>
  </div>
</body>
</html>
