<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .container { position: relative; width: 1080px; height: 1080px; background: #0A0A0A; }

  .bg-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
  .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(10,10,10,0.15) 0%, rgba(10,10,10,0.35) 40%, rgba(10,10,10,0.8) 65%, rgba(10,10,10,0.95) 80%); }

  .content { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 64px 120px 64px; z-index: 2; }
  .pill { background: #B8CC30; color: #0A0A0A; font-size: 18px; font-weight: 800; letter-spacing: 2px; padding: 12px 28px; border-radius: 50px; text-transform: uppercase; margin-bottom: 32px; }
  .title { color: white; font-size: 40px; font-weight: 700; text-align: center; margin-bottom: 20px; line-height: 1.2; }
  .subtitle { color: #9CA3AF; font-size: 22px; font-weight: 400; text-align: center; max-width: 700px; line-height: 1.5; }

  .footer { position: absolute; bottom: 0; left: 0; width: 1080px; height: 100px; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; z-index: 2; }
  .progress { display: flex; gap: 8px; }
  .bar { height: 6px; border-radius: 3px; }
  .bar-filled { width: 80px; background: #B8CC30; }
  .bar-empty { width: 80px; background: rgba(255,255,255,0.15); }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-square { width: 32px; height: 32px; background: #B8CC30; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #0F172A; border-radius: 4px; }
  .logo-text { color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 700; letter-spacing: 2px; }
</style>
</head>
<body>
  <div class="container">
    <img class="bg-photo" src="pub6-v2-diagnostic.jpg" alt="Diagnostic toiture">
    <div class="overlay"></div>

    <div class="content">
      <div class="pill">Étape 1 / 4</div>
      <div class="title">Diagnostic complet</div>
      <div class="subtitle">Inspection toiture + charpente<br>avant tout travaux</div>
    </div>

    <div class="footer">
      <div class="progress">
        <div class="bar bar-filled"></div>
        <div class="bar bar-empty"></div>
        <div class="bar bar-empty"></div>
        <div class="bar bar-empty"></div>
      </div>
      <div class="logo">
        <div class="logo-square">AM</div>
        <span class="logo-text">COUVERTURE</span>
      </div>
    </div>
  </div>
</body>
</html>
