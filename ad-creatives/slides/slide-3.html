<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .container { width: 1080px; height: 1080px; display: flex; flex-direction: column; background: #1a1a1a; }
  .photo-section { position: relative; width: 1080px; height: 470px; overflow: hidden; }
  .photo-section img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }
  .badge { position: absolute; top: 16px; left: 16px; padding: 8px 20px; border-radius: 6px; font-size: 22px; font-weight: 800; color: white; letter-spacing: 2px; text-transform: uppercase; z-index: 2; }
  .badge-avant { background: #DC2626; }
  .badge-apres { background: #16A34A; }
  .divider { width: 1080px; height: 4px; background: white; }
  .bottom-bar { width: 1080px; height: 136px; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 40px; gap: 8px; }
  .bottom-main { color: white; font-size: 26px; font-weight: 600; }
  .bottom-trust { display: flex; align-items: center; gap: 20px; }
  .bottom-trust span { color: rgba(255,255,255,0.85); font-size: 20px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-square { width: 32px; height: 32px; background: #B8CC30; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #0F172A; border-radius: 4px; }
  .logo-text { color: white; font-size: 16px; font-weight: 700; letter-spacing: 2px; }
</style>
</head>
<body>
  <div class="container">
    <div class="photo-section">
      <div class="badge badge-avant">Avant</div>
      <img src="../maison-3/avant.jpg" alt="Avant">
    </div>
    <div class="divider"></div>
    <div class="photo-section">
      <div class="badge badge-apres">Après</div>
      <img src="../maison-3/apres.jpg" alt="Après">
    </div>
    <div class="bottom-bar">
      <span class="bottom-main">Loiret (45) — Toiture + gouttières</span>
      <div class="bottom-trust">
        <span>⭐ 4.9/5</span>
        <span>🛡️ Décennale</span>
        <div class="logo">
          <div class="logo-square">AM</div>
          <span class="logo-text">COUVERTURE</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
