<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; display: inline-block; }
  .logo { display: flex; align-items: center; gap: 12px; padding: 20px; }
  .logo-square { width: 64px; height: 64px; background: #B8CC30; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #0F172A; border-radius: 6px; font-family: 'Segoe UI', Arial, sans-serif; }
  .logo-text { color: white; font-size: 36px; font-weight: 700; letter-spacing: 6px; font-family: 'Segoe UI', Arial, sans-serif; }
</style>
</head>
<body>
  <div class="logo">
    <div class="logo-square">AM</div>
    <span class="logo-text">COUVERTURE</span>
  </div>
</body>
</html>
